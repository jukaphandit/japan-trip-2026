<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Family Trip 2026 — Nagoya & Beyond</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ocean: #1a4a6b;
  --ocean-mid: #2d7da8;
  --ocean-light: #e8f4f8;
  --moss: #3d6b4f;
  --moss-light: #e8f0eb;
  --gold: #c9973a;
  --gold-light: #fdf3e3;
  --coral: #e07a5f;
  --sand-dark: #c4a882;
  --text: #1a1a2e;
  --muted: #6b7280;
  --border: rgba(26,74,107,0.12);
  --shadow: 0 2px 16px rgba(26,74,107,0.09);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans Thai','Noto Sans JP',sans-serif; background:#f0f4f8; color:var(--text); }

/* HERO */
.hero {
  background: linear-gradient(160deg, var(--ocean) 0%, #0d2f45 60%, #1a3a2a 100%);
  padding: 2.5rem 1.5rem 3.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-sub { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--sand-dark); margin-bottom:10px; }
.hero h1 { font-family:'Shippori Mincho',serif; font-size:clamp(20px,5vw,36px); color:#fff; font-weight:600; line-height:1.25; margin-bottom:6px; }
.hero-sub2 { font-family:'Shippori Mincho',serif; font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:16px; }
.hero-tags { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
.hero-tag { font-size:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.85); padding:4px 12px; border-radius:20px; }
.hero-controls { display:flex; flex-direction:column; align-items:center; gap:12px; }
.wave { position:absolute; bottom:-2px; left:0; right:0; }

/* TOGGLES */
.toggle-row { display:inline-flex; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); border-radius:30px; padding:3px; gap:2px; }
.tbtn { padding:7px 20px; border-radius:26px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:transparent; color:rgba(255,255,255,0.7); transition:all .2s; font-family:inherit; }
.tbtn.active { background:#fff; color:var(--ocean); }

/* DAY TABS — sticky below hero */
.day-tabs-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #f0f4f8;
  padding: 8px 1rem;
  display: flex;
  gap: 6px;
  justify-content: flex-start;
  overflow-x: auto;
  box-shadow: 0 2px 12px rgba(26,74,107,0.08);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-tabs-wrap::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  min-width: 100px;
  padding: 8px 12px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  line-height: 1.4;
}
.day-tab .tab-num { display:block; font-size:11px; color:var(--muted); margin-bottom:1px; }
.day-tab.active-d1 { background:var(--ocean); border-color:var(--ocean); color:#fff; }
.day-tab.active-d1 .tab-num { color:rgba(255,255,255,0.7); }
.day-tab.active-d2 { background:var(--moss); border-color:var(--moss); color:#fff; }
.day-tab.active-d2 .tab-num { color:rgba(255,255,255,0.7); }
.day-tab.active-d3 { background:#7a4f2e; border-color:#7a4f2e; color:#fff; }
.day-tab.active-d3 .tab-num { color:rgba(255,255,255,0.7); }
.day-tab.active-d4 { background:#5a3472; border-color:#5a3472; color:#fff; }
.day-tab.active-d4 .tab-num { color:rgba(255,255,255,0.7); }
.day-tab.active-d5 { background:#1a6b5a; border-color:#1a6b5a; color:#fff; }
.day-tab.active-d5 .tab-num { color:rgba(255,255,255,0.7); }

/* CONTAINER */
.container { max-width:760px; margin:0 auto; padding:1.25rem 1rem 3rem; }

/* WEATHER */
.weather-bar { background:#fff; border-radius:14px; padding:12px 16px; margin-bottom:1rem; display:flex; gap:6px; flex-wrap:wrap; align-items:center; box-shadow:var(--shadow); }
.w-pill { font-size:12px; color:var(--muted); background:var(--ocean-light); padding:3px 10px; border-radius:20px; }
.w-warn { font-size:12px; background:var(--gold-light); color:var(--gold); padding:3px 12px; border-radius:20px; font-weight:500; margin-left:auto; }

/* DAY HEADER */
.day-hd { display:flex; align-items:center; gap:12px; margin-bottom:1rem; }
.day-num { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'Shippori Mincho',serif; font-size:20px; color:#fff; font-weight:600; flex-shrink:0; }
.day-num.d1 { background:var(--ocean); }
.day-num.d2 { background:var(--moss); }
.day-num.d3 { background:#7a4f2e; }
.day-num.d4 { background:#5a3472; }
.day-num.d5 { background:#1a6b5a; }
.day-hd h2 { font-size:17px; font-weight:700; }
.day-hd p { font-size:12px; color:var(--muted); margin-top:2px; }

/* OUTFIT */
.outfit-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem; }
.otag { font-size:12px; background:#fff; border:1px solid var(--border); border-radius:20px; padding:4px 10px; }

/* ROUTE */
.route-card { background:#fff; border-radius:14px; padding:14px 16px; margin-bottom:1rem; box-shadow:var(--shadow); }
.route-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:10px; }
.route-steps { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.rs { font-size:11px; background:var(--ocean-light); border-radius:8px; padding:5px 10px; color:var(--ocean); text-align:center; line-height:1.4; }
.rs small { display:block; font-size:10px; opacity:.75; }
.rs.star { background:var(--moss); color:#fff; font-weight:500; }
.rarr { color:var(--muted); font-size:12px; }

/* TIMELINE */
.tl-row { display:grid; grid-template-columns:52px 1fr; gap:10px; margin-bottom:9px; }
.tl-t { font-size:11px; font-weight:700; color:var(--muted); text-align:right; padding-top:13px; }
.card { background:#fff; border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); border-left:3px solid transparent; }
.card.c-blue { border-left-color:var(--ocean-mid); }
.card.c-green { border-left-color:var(--moss); }
.card.c-gold { border-left-color:var(--gold); }
.card.c-coral { border-left-color:var(--coral); }
.card-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:3px; line-height:1.4; }
.card-desc { font-size:12px; color:var(--muted); line-height:1.6; }
.badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; margin-top:5px; line-height:1.5; margin-right:3px; }
.b-hist { background:#e8f0fb; color:#1a4a8a; }
.b-tip { background:var(--gold-light); color:#8a6220; }
.b-good { background:var(--moss-light); color:var(--moss); }
.prices { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.ptag { font-size:11px; background:var(--ocean-light); color:var(--ocean); padding:2px 8px; border-radius:6px; }

/* NOTES */
.notes-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin:1rem 0 .5rem; }
.notes-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ni { background:#fff; border-radius:10px; padding:10px 12px; box-shadow:var(--shadow); }
.ni-k { font-size:11px; color:var(--muted); margin-bottom:2px; }
.ni-v { font-size:13px; font-weight:500; }

.footer { text-align:center; font-size:12px; color:var(--muted); padding:1.5rem 0; border-top:1px solid var(--border); margin-top:2rem; }

@media(max-width:480px){ .notes-grid{grid-template-columns:1fr;} }
</style>
</head>

var lang = 'th';
var day = 1;

function setLang(l) {
  lang = l;
  document.getElementById('btn-th').classList.toggle('active', l==='th');
  document.getElementById('btn-jp').classList.toggle('active', l==='jp');
  document.body.style.fontFamily = l==='jp' ? "'Noto Sans JP',sans-serif" : "'Noto Sans Thai','Noto Sans JP',sans-serif";
  render();
}

function setDay(d) {
  day = d;
  render();
}

function render() {
  var D = lang==='th' ? TH : JP;
  var data = D.days[day-1];

  // Hero
  document.getElementById('h-sub').textContent = D.heroSub;
  document.getElementById('h-title').innerHTML = D.heroTitle;
  document.getElementById('h-sub2').textContent = D.heroSub2;
  document.getElementById('h-tags').innerHTML = D.heroTags.map(function(t){return '<span class="hero-tag">'+t+'</span>';}).join('');

  // Tabs
  for(var i=1;i<=6;i++){
    var tab = document.getElementById('tab-'+i);
    document.getElementById('tab'+i+'-num').textContent = D.tabNums[i-1];
    document.getElementById('tab'+i+'-title').textContent = D.tabTitles[i-1];
    tab.className = 'day-tab' + (day===i ? ' active-d'+i : '');
  }

  // Build content
  var html = '';

  // Day header
  html += '<div class="day-hd"><div class="day-num '+data.cls+'">'+data.num+'</div><div><h2>'+data.title+'</h2><p>'+data.sub+'</p></div></div>';

  // Weather
  html += '<div class="weather-bar">';
  data.weather.forEach(function(w){html+='<span class="w-pill">'+w+'</span>';});
  html += '<span class="w-warn">'+data.wwarn+'</span></div>';

  // Outfit
  html += '<div class="outfit-row">';
  data.outfit.forEach(function(o){html+='<span class="otag">'+o+'</span>';});
  html += '</div>';

  // Route
  html += '<div class="route-card"><div class="route-lbl">'+data.routeLbl+'</div><div class="route-steps">';
  data.route.forEach(function(r,ri){
    if(ri>0) html+='<span class="rarr">→</span>';
    html+='<div class="rs'+(r.star?' star':'')+'">'+r.t+'<small>'+r.s+'</small></div>';
  });
  html += '</div></div>';

  // Timeline
  data.tl.forEach(function(item){
    html += '<div class="tl-row"><div class="tl-t">'+item.t+'</div><div class="card '+item.cls+'">';
    html += '<div class="card-title">'+item.title+'</div>';
    html += '<div class="card-desc">'+item.desc+'</div>';
    if(item.badges) item.badges.forEach(function(b){html+='<span class="badge '+b.c+'">'+b.t+'</span>';});
    if(item.prices){html+='<div class="prices">';item.prices.forEach(function(p){html+='<span class="ptag">'+p+'</span>';});html+='</div>';}
    html += '</div></div>';
  });

  // Notes
  html += '<p class="notes-lbl">'+data.notesLbl+'</p><div class="notes-grid">';
  data.notes.forEach(function(n){html+='<div class="ni"><div class="ni-k">'+n.k+'</div><div class="ni-v">'+n.v+'</div></div>';});
  html += '</div>';

  html += '<div class="footer">'+D.footer+'</div>';

  document.getElementById('main-content').innerHTML = html;
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
